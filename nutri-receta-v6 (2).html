<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; background:#d8dce2; -webkit-user-select:none; user-select:none; }
input,textarea,button { -webkit-user-select:auto; user-select:auto; }

.layout {
  height:100vh;
  display:flex; align-items:center; justify-content:center;
  gap:22px; padding:10px 16px 6px;
}

/* PNG: 1209 × 2000 px */
.paper {
  position:relative;
  aspect-ratio:1209/2000;
  height:calc(100vh - 20px);
  max-height:860px;
  width:auto;
  flex-shrink:0;
  background:#fff;
  box-shadow:0 4px 32px rgba(0,0,0,.20);
  border-radius:2px;
  overflow:hidden;
}
.paper-bg {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:fill; pointer-events:none; z-index:0; display:block;
}

/* ── TEXT FIELDS ─────────────────────────────────────────────
   LEFT  = where underline starts (pixel-measured from PNG)
   BOTTOM = 100% − underline_y%  (anchors text to the line)

   FECHA:     underline x=70.06%, y=9.25%
   PACIENTE:  underline x=34.16%, y=14.15%
   DOB:       underline x=42.18%→78.74%, y=18.90%
   REGISTRO:  underline x=79.07%, y=19.20%
   BODY:      top=28.10%, x=7.5%→91.8%
   NOMBRE:    top=83.60%, x=18.4%
   CED:       top=86.85%, x=24.1%
   ESP:       top=86.85%, x=80.1%
   INST:      top=89.70%, x=51.8%
   ──────────────────────────────────────────────────────────── */
.f {
  position:absolute; z-index:10;
  background:transparent; border:none; outline:none; resize:none;
  padding:0 2px;
  font-family:'EB Garamond',Georgia,serif;
  color:#111; font-size:var(--fs,12px); line-height:1;
}
.f:focus { background:rgba(0,90,178,.05); outline:1px dashed rgba(0,90,178,.28); border-radius:2px; }
.f::placeholder { color:rgba(0,0,0,.22); font-style:normal; font-family:system-ui,-apple-system,Arial,sans-serif; }

#f-fecha    { bottom:90.75%; left:70.06%; right:4.30%; text-align:left; }
#f-paciente { bottom:85.85%; left:34.16%; right:4.20%; font-size:calc(var(--fs,12px)*1.05); font-weight:500; white-space:nowrap; overflow:hidden; }
#f-dob      { bottom:81.10%; left:42.18%; right:21.26%; }
#f-registro { bottom:80.80%; left:79.07%; right:4.30%; }
#f-body     { top:28.10%; left:7.50%; right:8.20%; bottom:49.50%; font-size:calc(var(--fs,12px)*1.05); line-height:1.72; overflow-y:auto; overflow-x:hidden; white-space:pre-wrap; word-break:break-word; scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.10) transparent; }
#f-nombre   { top:83.60%; left:18.40%; right:36.00%; white-space:nowrap; overflow:hidden; }
#f-ced      { top:86.85%; left:24.10%; width:22%; white-space:nowrap; }
#f-esp      { top:86.85%; left:80.10%; right:4.00%; white-space:nowrap; }
#f-inst     { top:89.70%; left:51.80%; right:23.90%; white-space:nowrap; }

.paper.print-mode .paper-bg {
  filter: grayscale(1) contrast(999);
}
.paper.print-mode .f { outline:none !important; background:transparent !important; }

/* ── SIGNATURE WIDGET ────────────────────────────────────────
   Positioned over the FIRMA area.
   FIRMA label ends x=73.2%, underline y=85.45%
   Field: bottom=14.55%, left=73.2%, right=3.7%
   ──────────────────────────────────────────────────────────── */
.sig-widget {
  position:absolute; z-index:15;
  top:77.14%;
  bottom:16.81%;
  left:58.86%;
  right:2.89%;
  overflow:hidden;
  cursor:text;
  border-radius:3px;
  background:transparent;
  /* subtle border-only indicator — no fill, invisible in PDF */
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07);
  transition: box-shadow 0.2s;
}
.sig-widget:hover {
  box-shadow: inset 0 0 0 1px rgba(0,90,178,0.20);
}
.sig-widget:focus-within {
  box-shadow: inset 0 0 0 1.5px rgba(0,90,178,0.30);
}
/* In the PDF clone, strip even the border hint */
.paper.print-mode .sig-widget {
  box-shadow: none !important;
  background: transparent !important;
}

/* Hidden input that drives the signature */
#sig-input {
  position:absolute;
  opacity:0; pointer-events:none;
  width:1px; height:1px; top:0; left:0;
  font-size:16px; /* prevents iOS zoom */
}

/* Letter bank (hidden, used as template source) */
.letter-bank { display:none; }

/* The rendered signature SVG strokes */
.signature-main {
  display:flex;
  align-items:flex-end;   /* letters sit on the bottom = on the underline */
  flex-flow:row nowrap;
  justify-content:flex-start;
  width:100%;
  height:100%;
  overflow:hidden;
  padding: 4px 6px 2px 6px;
}
.signature-main svg path {
  stroke-linejoin:round;
  stroke-linecap:round;
  stroke-width:1.5;
  stroke:#005ab2;
  fill:none;
  transition:stroke-dashoffset 0.18s ease;
}
.paper.print-mode .signature-main svg path {
  stroke:#000 !important;
}
.up, .lo { max-height:51px; }

/* Scale the SVG letters to fit the widget height */
.sig-widget .signature-main svg {
  height:100%;
  width:auto;
}

/* Uppercase letter margins (from original CSS) */
.up.a{margin:0 -10px 0 -7px}.up.b{margin:0 -5px 0 -13px}.up.c{margin:0 -5px 0 -6px}
.up.d{margin:0 -6px 0 -6px}.up.e{margin:0 -10px 0 -8px}.up.f{margin:0 -13px 0 -5px}
.up.g{margin:0 0px 0 -6px}.up.h{margin:0 -8px 0 -6px}.up.i{margin:0 -25px 0 -16px}
.up.j{margin:0 -24px 0 -6px}.up.k{margin:0 -23px 0 -3px}.up.l{margin:0 -7px 0 -5px}
.up.m{margin:0 -7px 0 -10px}.up.n{margin:0 -4px 0 -10px}.up.o{margin:0 -1px 0 -1px}
.up.p{margin:0 -12px 0 -3px}.up.q{margin:0 -3px 0 -3px}.up.r{margin:0 -8px 0 -4px}
.up.s{margin:0 -14px 0 -2px}.up.t{margin:0 -29px 0 -17px}.up.u{margin:0 -10px 0 -1px}
.up.v{margin:0 -15px 0 -6px}.up.w{margin:0 -8px 0 -6px}.up.x{margin:0 -11px 0 -13px}
.up.y{margin:0 -12px 0 2px}.up.z{margin:0 -9px 0 -8px}
/* Lowercase letter margins */
.lo.a{margin:0 -4px 0 0}.lo.b{margin:0 -6px 0 -1.5px}.lo.c{margin:0 -4px 0 0}
.lo.d{margin:0 -11.3px 0 0}.lo.e{margin:0 -4px 0 0}.lo.f{margin:0 -6px 0 -6px}
.lo.g{margin:0 -4px 0 -10px}.lo.h{margin:0 -4px 0 -1px}.lo.i{margin:0 -3.5px 0 0}
.lo.j{margin:0 -5px 0 -14px}.lo.k{margin:0 -6.5px 0 0}.lo.l{margin:0 -12px 0 -4px}
.lo.m,.lo.n{margin:0 -5px 0 0}.lo.o{margin:0 -2.5px 0 0}.lo.p{margin:0 -2.5px 0 -10px}
.lo.q{margin:0 -2px 0 -6px}.lo.r{margin:0 -3px 0 -1px}.lo.s{margin:0 -4px 0 -4px}
.lo.t{margin:0 -12.5px 0 -3.5px}.lo.u,.lo.v{margin:0 -4.5px 0 0}
.lo.w,.lo.x{margin:0 -4px 0 0}.lo.y{margin:0 -4px 0 -9px}.lo.z{margin:0 -4px 0 -10px}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar { display:flex; flex-direction:column; gap:6px; width:130px; flex-shrink:0; align-self:flex-start; margin-top:56px; }
.btn { font-family:system-ui,-apple-system,Arial,sans-serif; font-size:12px; font-weight:500; height:30px; width:100%; border:none; border-radius:6px; cursor:pointer; transition:filter .15s,transform .1s; display:flex; align-items:center; justify-content:center; gap:5px; color:#fff; background:#005ab2; }
.btn:hover { filter:brightness(1.15); }
.btn:active { transform:scale(.96); }
.sep { height:1px; background:#c8cdd6; margin:2px 0; }

footer { position:fixed; bottom:0; left:0; right:0; text-align:center; font-family:system-ui,-apple-system,Arial,sans-serif; font-size:9px; color:#9ca3af; padding:3px; pointer-events:none; }
</style>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// Auto-date
(function(){
  const m=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const d=new Date();
  document.getElementById('f-fecha').value=`${d.getDate()} de ${m[d.getMonth()]} de ${d.getFullYear()}`;
})();

// Font scaling
const paper=document.getElementById('paper');
function applyFs(h){ paper.style.setProperty('--fs',(h/800*12)+'px'); }
new ResizeObserver(e=>applyFs(e[0].contentRect.height)).observe(paper);
requestAnimationFrame(()=>applyFs(paper.getBoundingClientRect().height));

// ── SIGNATURE ENGINE ─────────────────────────────────────────
const sigInput    = document.getElementById('sig-input');
const sign        = document.getElementById('signature-main');
const uppercase   = document.querySelectorAll('.letter-bank .up');
const lowercase   = document.querySelectorAll('.letter-bank .lo');
const sigWidget   = document.getElementById('sig-widget');

sigInput.addEventListener('keydown', (event) => {
  if ((event.code===`Key${event.key.toUpperCase()}`) || event.code==='Space') {
    draw(event.key, true);
  } else if (event.code==='Backspace') {
    setTimeout(()=>{
      sign.innerHTML='';
      sigInput.value.split('').forEach(ch=>draw(ch,false));
    },50);
  }
});

function draw(key, animate) {
  if (key===' ') {
    const sp=document.createElement('div');
    sp.style.minWidth='12px';
    sign.appendChild(sp);
  } else {
    const alphabet=Array.from({length:26},(_,i)=>String.fromCharCode(97+i));
    for (let i=0;i<alphabet.length;i++) {
      if (key.toLowerCase()===alphabet[i]) {
        const letter=document.createElement('div');
        if (key===alphabet[i].toUpperCase()) {
          letter.innerHTML=uppercase[i].innerHTML;
          letter.classList.add('up');
        } else {
          letter.innerHTML=lowercase[i].innerHTML;
          letter.classList.add('lo');
        }
        letter.classList.add(alphabet[i]);
        if (animate) {
          setTimeout(()=>{ letter.querySelector('svg path').style.strokeDashoffset='0'; },50);
        } else {
          letter.querySelector('svg path').style.strokeDashoffset='0';
        }
        sign.appendChild(letter);
        break;
      }
    }
  }
}

// ── FORM CONTROLS ────────────────────────────────────────────
function clearForm(){
  ['f-paciente','f-dob','f-registro','f-body'].forEach(id=>{ document.getElementById(id).value=''; });
  sign.innerHTML=''; sigInput.value='';
  const m=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const d=new Date();
  document.getElementById('f-fecha').value=`${d.getDate()} de ${m[d.getMonth()]} de ${d.getFullYear()}`;
  document.getElementById('f-paciente').focus();
}

function sendEmail(){
  const pac=document.getElementById('f-paciente').value.trim()||'Paciente';
  const body=document.getElementById('f-body').value.trim();
  const doctor=document.getElementById('f-nombre').value.trim()||'Dr. Francisco Guadarrama Conzuelo';
  const sub=`Receta médica – ${pac}`;
  const txt=`Paciente: ${pac}\n\n${body}\n\n${doctor}`;
  window.location.href='mailto:?subject='+encodeURIComponent(sub)+'&body='+encodeURIComponent(txt);
}

function printBlank(){
  const src=document.querySelector('.paper-bg').src;
  const win=window.open('','_blank','width=620,height=1020');
  win.document.write(`<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#fff}img{width:100vw;height:100vh;object-fit:contain;display:block}@page{margin:0}</style></head><body><img src="${src}"><script>window.onload=function(){window.print();window.close();}<\/script></body></html>`);
  win.document.close();
}

async function generatePDF(blank){
  const ids=['f-fecha','f-paciente','f-dob','f-registro','f-body','f-nombre','f-ced','f-esp','f-inst'];
  const vals={};
  ids.forEach(id=>{ vals[id]=document.getElementById(id).value; });

  const RW=605, RH=1000;
  const clone=paper.cloneNode(true);
  clone.removeAttribute('id');
  clone.classList.add('print-mode');
  Object.assign(clone.style,{
    position:'fixed',top:'-20000px',left:'-20000px',
    width:RW+'px',height:RH+'px',
    maxHeight:'none',aspectRatio:'unset',
    borderRadius:'0',overflow:'hidden',zIndex:'-1',
  });
  clone.style.setProperty('--fs',(RH/800*12)+'px');

  if(blank){
    ids.forEach(id=>{
      const el=clone.querySelector('#'+id);
      if(el) el.value='';
    });
    const sm=clone.querySelector('#signature-main');
    if(sm) sm.innerHTML='';
  }

  document.body.appendChild(clone);
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  await new Promise(r=>setTimeout(r,350));

  try{
    const canvas=await html2canvas(clone,{
      scale:3,useCORS:true,allowTaint:true,
      backgroundColor:'#ffffff',logging:false,
      width:RW,height:RH,windowWidth:RW,windowHeight:RH,scrollX:0,scrollY:0,
    });
    const mmW=(RW/96)*25.4, mmH=(RH/96)*25.4;
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:[mmW,mmH]});
    pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,mmW,mmH,undefined,'FAST');
    const pac=vals['f-paciente']||'';
    const clean=pac.replace(/[^a-zA-ZáéíóúñÁÉÍÓÚÑ\s]/g,'').trim().replace(/\s+/g,'_')||'Receta';
    const d=new Date();
    const stamp=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    pdf.save(blank?`Receta_blanco_${stamp}.pdf`:`Receta_${clean}_${stamp}.pdf`);
  }catch(err){
    console.error(err);
    alert('Error al generar PDF: '+err.message);
  }finally{
    document.body.removeChild(clone);
  }
}
</script>
</body>
</html>
