<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Ysabeau:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #214fca;
    --gold:    #F0A315;
    --navy:    #001F3F;
    --bg:      #f0f2f8;
    --text:    #1a1b2e;
    --label:   #6b7280;
    --edge:    #e2e5ef;
    --ui:      'Plus Jakarta Sans', sans-serif;
    --literary: 'Ysabeau', sans-serif;
    --ease:    cubic-bezier(.16,1,.3,1);
    --spring:  cubic-bezier(.34,1.56,.64,1);
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: var(--ui);
    background: var(--bg);
    color: var(--text);
  }

  /* ── Canvas ── */
  #bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── Layout ── */
  .stage {
    position: relative; z-index: 1;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    gap: 0;
  }

  /* ── Sad face ── */
  .face {
    width: clamp(40px, 7vw, 72px);
    height: clamp(40px, 7vw, 72px);
    opacity: 0;
    transform: translateY(-12px) scale(.9);
    animation: popIn .7s var(--spring) .1s forwards;
  }
  .face svg {
    width: 100%; height: 100%;
  }
  .face svg path { fill: var(--blue); }

  /* ── 404 ── */
  .four-o-four {
    font-family: var(--ui);
    font-size: clamp(96px, 20vw, 240px);
    font-weight: 800;
    line-height: .88;
    letter-spacing: -.04em;
    color: var(--blue);
    opacity: 0;
    transform: translateY(20px);
    animation: popIn .8s var(--spring) .22s forwards;
    /* Subtle outline effect for depth */
    -webkit-text-stroke: 1.5px rgba(33,79,202,.15);
    user-select: none;
  }

  /* ── Divider wave ── */
  .wave-div {
    margin: clamp(12px, 2.5vh, 24px) 0;
    opacity: 0;
    animation: fadeUp .6s var(--ease) .45s forwards;
  }
  .wave-div svg { display: block; }

  /* ── Headline ── */
  .headline {
    font-family: var(--literary);
    font-size: clamp(18px, 2.4vw, 26px);
    font-weight: 500;
    color: var(--text);
    text-align: center;
    letter-spacing: .01em;
    opacity: 0;
    animation: fadeUp .6s var(--ease) .52s forwards;
  }

  /* ── Subline ── */
  .subline {
    font-family: var(--literary);
    margin-top: clamp(6px, 1.2vh, 12px);
    font-size: clamp(14px, 1.5vw, 17px);
    font-weight: 300;
    color: var(--label);
    text-align: center;
    max-width: 36ch;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp .6s var(--ease) .6s forwards;
  }

  /* ── Back button ── */
  .btn-back {
    margin-top: clamp(20px, 3.5vh, 36px);
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    background: var(--blue);
    color: #fff;
    border: none; border-radius: 10px;
    font-family: var(--ui);
    font-size: clamp(13px, 1.3vw, 15px);
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -.01em;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp .6s var(--ease) .72s forwards;
    transition: background .18s, transform .18s var(--spring), box-shadow .18s;
    box-shadow: 0 2px 12px rgba(33,79,202,.22);
    text-decoration: none;
  }
  .btn-back:hover {
    background: #1a3fa5;
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 6px 20px rgba(33,79,202,.32);
  }
  .btn-back:active { transform: scale(.97); }
  .btn-back svg { flex-shrink: 0; }

  /* ── Language tag ── */
  .lang-tag {
    position: fixed; bottom: 1.4rem; right: 1.6rem;
    font-size: 11px; font-weight: 500;
    color: var(--label); opacity: .5;
    letter-spacing: .06em; text-transform: uppercase;
  }

  /* ── Animations ── */
  @keyframes popIn {
    from { opacity: 0; transform: translateY(-12px) scale(.9); }
    to   { opacity: 1; transform: translateY(0)    scale(1);   }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  /* ── Retina / hi-DPI: crisper canvas ── */
  @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
    .four-o-four { -webkit-text-stroke-width: 1px; }
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .subline { max-width: 28ch; }
    .wave-div { margin: 10px 0; }
  }

  /* ── Tablet ── */
  @media (min-width: 481px) and (max-width: 1024px) {
    .four-o-four { font-size: clamp(120px, 18vw, 180px); }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="stage">

  <!-- Sad face -->
  <div class="face" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
      <path d="M158.66,188.43a8,8,0,0,1-11.09,2.23C141.07,186.34,136,184,128,184s-13.07,2.34-19.57,6.66a8,8,0,0,1-8.86-13.32C108,171.73,116.06,168,128,168s20,3.73,28.43,9.34A8,8,0,0,1,158.66,188.43ZM224,48v55.77c0,35.84-9.65,69.65-27.18,95.18-18.16,26.46-42.6,41-68.82,41s-50.66-14.57-68.82-41C41.65,173.44,32,139.63,32,103.79V48A16,16,0,0,1,53.79,33.09C67.84,38.55,96.18,47.71,128,47.71s60.15-9.16,74.21-14.62A16,16,0,0,1,224,48Zm-16,0v0c-15.1,5.89-45.57,15.73-80,15.73S63.1,53.87,48,48v55.79c0,32.64,8.66,63.23,24.37,86.13C87.46,211.9,107.21,224,128,224s40.54-12.1,55.63-34.08C199.34,167,208,136.43,208,103.79Zm-18.66,66a8,8,0,0,0-11.3.62c-2.68,3-8.85,5.34-14,5.34s-11.36-2.35-14-5.34A8,8,0,0,0,138,125.33c5.71,6.38,16.14,10.67,26,10.67s20.25-4.29,26-10.67A8,8,0,0,0,189.34,114ZM118,125.33A8,8,0,0,0,106,114.66c-2.68,3-8.85,5.34-14,5.34s-11.36-2.35-14-5.34A8,8,0,0,0,66,125.33C71.75,131.71,82.18,136,92,136S112.25,131.71,118,125.33Z"/>
    </svg>
  </div>

  <!-- Big 404 -->
  <div class="four-o-four" aria-label="404">404</div>

  <!-- Gold wave divider -->
  <div class="wave-div" aria-hidden="true">
    <svg width="48" height="12" viewBox="0 0 48 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 6 C6 2, 10 10, 14 6 S22 2, 26 6 S34 10, 38 6 S44 2, 46 6"
            stroke="#F0A315" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <!-- Headline + subline (set by JS) -->
  <p class="headline" id="hl"></p>
  <p class="subline"  id="sl"></p>

  <!-- Back button -->
  <button class="btn-back" id="btn" onclick="goBack()" aria-label="Go back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    <span id="btn-lbl"></span>
  </button>

</div>

<span class="lang-tag" id="lang-tag"></span>

<script>
/* ── Language detection & copy ── */
(function () {
  const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().slice(0, 2);

  const copy = {
    es: {
      hl:   'Página no encontrada',
      sl:   'La dirección que buscas no existe o fue movida. Puedes regresar a donde estabas.',
      btn:  'Regresar',
      tag:  'es',
    },
    fr: {
      hl:   'Page introuvable',
      sl:   'L\'adresse que vous cherchez n\'existe pas ou a été déplacée. Vous pouvez revenir en arrière.',
      btn:  'Retourner',
      tag:  'fr',
    },
    en: {
      hl:   'Page not found',
      sl:   'The address you\'re looking for doesn\'t exist or has been moved. You can go back to where you were.',
      btn:  'Go back',
      tag:  'en',
    },
    la: {
      hl:   'Pagina non inventa',
      sl:   'Locus quem quaeris non exstat aut motus est. Redire potes.',
      btn:  'Redire',
      tag:  'la',
    },
  };

  const c = copy[lang] || copy.la;
  document.getElementById('hl').textContent     = c.hl;
  document.getElementById('sl').textContent     = c.sl;
  document.getElementById('btn-lbl').textContent = c.btn;
  document.getElementById('lang-tag').textContent = c.tag;
  document.documentElement.lang = lang in copy ? lang : 'la';
})();

/* ── Smart back navigation ── */
function goBack() {
  if (history.length > 1) {
    history.back();
  } else {
    window.location.href = '/';
  }
}

/* ── Particle background (recetador system) ── */
(function () {
  const cv = document.getElementById('bg');
  const cx = cv.getContext('2d');
  let W, H, pts = [];
  const N = 200;
  const PAL = ['#214fca','#5a689e','#4f73e8','#1a3fa5','#353369','#216b88','#001f3f'];
  const rgb = PAL.map(h => {
    const v = parseInt(h.slice(1), 16);
    return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
  });

  function lerp(t) {
    const cyc = PAL.length * 3, pos = (t % cyc) / 3;
    const i = Math.floor(pos) % rgb.length, j = (i + 1) % rgb.length;
    const f = pos - Math.floor(pos);
    const e = f < .5 ? 4*f*f*f : 1 - Math.pow(-2*f+2,3)/2;
    return {
      r: Math.round(rgb[i].r + (rgb[j].r - rgb[i].r) * e),
      g: Math.round(rgb[i].g + (rgb[j].g - rgb[i].g) * e),
      b: Math.round(rgb[i].b + (rgb[j].b - rgb[i].b) * e),
    };
  }

  class P {
    constructor() {
      this.ox = Math.random() * W; this.oy = Math.random() * H;
      this.x = this.ox; this.y = this.oy;
      this.sz = Math.random() + .2;
      this.px = Math.random() * Math.PI * 2; this.py = Math.random() * Math.PI * 2;
      this.fx = .15 + Math.random() * .4;    this.fy = .1  + Math.random() * .35;
    }
    upd(t) {
      this.x = this.ox + Math.sin(t * this.fx * 2.5 + this.px) * 16;
      this.y = this.oy + Math.cos(t * this.fy * 2.5 + this.py) * 16;
    }
    draw(cx, c) {
      cx.beginPath();
      cx.arc(this.x, this.y, this.sz * 1.8, 0, Math.PI * 2);
      cx.fillStyle = `rgba(${c.r},${c.g},${c.b},0.38)`;
      cx.fill();
    }
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    cv.width  = W * dpr; cv.height = H * dpr;
    cv.style.width  = W + 'px'; cv.style.height = H + 'px';
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    pts = [];
    for (let i = 0; i < N; i++) pts.push(new P());
  }

  window.addEventListener('resize', resize);
  resize();

  const t0 = performance.now();
  (function loop() {
    const t = (performance.now() - t0) / 1000;
    cx.fillStyle = '#f0f2f8';
    cx.fillRect(0, 0, W, H);
    const c = lerp(t);
    for (const p of pts) { p.upd(t); p.draw(cx, c); }
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
