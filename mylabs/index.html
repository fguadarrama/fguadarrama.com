<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial médico | FGC</title>
  <style>
    :root{--bg:#f6f7fc;--ink:#062540;--muted:rgba(6,37,64,.58);--surface:#fff;--border:rgba(6,37,64,.12);--accent:#25d266;--danger:#ff1d58;--shadow:0 24px 60px -24px rgba(6,37,64,.3);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}html,body{height:100%;margin:0}body{min-height:100%;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,rgba(37,210,102,.18),transparent 28rem),radial-gradient(circle at 80% 80%,rgba(49,113,186,.14),transparent 26rem),var(--bg);color:var(--ink)}.card{width:min(92vw,430px);background:color-mix(in srgb,var(--surface) 94%,transparent);border:1px solid var(--border);border-radius:24px;padding:32px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}.eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700}.brand{font-size:26px;line-height:1.05;font-weight:760;margin:10px 0 8px}.sub{color:var(--muted);font-size:14px;line-height:1.45;margin:0 0 24px}label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}input{width:100%;border:1px solid var(--border);border-radius:14px;padding:13px 14px;font:inherit;color:var(--ink);background:#fff;outline:none}input:focus{border-color:color-mix(in srgb,var(--accent) 70%,var(--ink));box-shadow:0 0 0 4px rgba(37,210,102,.14)}button{width:100%;margin-top:14px;border:0;border-radius:14px;padding:13px 16px;font:inherit;font-weight:750;cursor:pointer;background:var(--ink);color:#fff}button:disabled{opacity:.55;cursor:progress}.error{min-height:20px;margin-top:12px;color:var(--danger);font-size:13px}.foot{margin-top:18px;color:var(--muted);font-size:12px;line-height:1.4}.lock{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:rgba(37,210,102,.13);margin-bottom:18px}.lock svg{width:22px;height:22px}.shake{animation:shake .26s ease-in-out}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  </style>
</head>
<body>
  <main class="card" id="card">
    <div class="lock" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="#062540" stroke-width="2" stroke-linecap="round"/><rect x="5" y="10" width="14" height="10" rx="2.5" stroke="#062540" stroke-width="2"/><path d="M12 14v2" stroke="#062540" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="eyebrow">Acceso protegido</div>
    <div class="brand">Historial médico | FGC</div>
    <p class="sub">Introduce la contraseña para abrir el visualizador de laboratorios.</p>
    <form id="form" autocomplete="current-password">
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" autofocus />
      <button id="submit" type="submit">Entrar</button>
      <div class="error" id="error" role="alert"></div>
    </form>
    <div class="foot">La página se descifra localmente en el navegador. Funciona en GitHub Pages porque no requiere servidor.</div>
  </main>
  <script>
    const payload = {"v":1,"kdf":"PBKDF2-SHA256","cipher":"AES-256-GCM","iterations":210000,"salt":"cQhe955PTxMVp8UjIbEPMw==","iv":"zTCIHiAytUezHyKn","data":"U7syTNLqS5IYBeJRK9vIwHt/tvUWZYl9coENuzLluPKBm9OvWp/iQfjkzHzSDHEnoKO4FJd8Dt2vD1wL8Mxr1rFkMSkv7TGZoBGe8QF3kcoQSsnkJxb8/KyaRYG0ZmwclsmFpgwe3yCHnH2pO4TL+HEs61gFsAs4rFCbbC+TYpBlI6z1CFLV5OCdFOhy91Gp/RIZpcV0NwAG6laqJX3bHwNCnv/SJHOU+/CrGocwtbBBuogSbvoQxpUvxeYmR3pyhUkVtlHMEFDccnL7yWs8SShI70qSdxbLKKEU1ucBjGwlY/iy4V05YEjQN+1gppGFfbpBCdt0mcPWN/KXXpc98vqZWZf9Y3vtXVPhs8o+/US63c6G2f+ijQ474cn9SfdkBjEp/bTeY7ow0A6mDypCLEiVj9fh74bsBINazznMWasj3Y8GByl0/i4xnOTA3q1pnJi1gckWdRlspqmcIbPCxVp9mp0mlVaeGH/uktoW2EKoLZT0mDt7IGR9hiGg4ttW3YMT+J3mdQtz/+ia3Z7TqVtvtw//L2KsR0L+h0fg9Jyzqg5XEtGdIBOKa4qMvoKT5OUXbcoO11cbSvAqVseqNZYQKKE6No8f3Mz7p7ijEE8yn0pd3bRa34lEt84YrVt2C12v4kKkIsWln0zMQv+ieZRp/8iRYYLlYhouzIEdTmk20N4pJ5X5N2kyYEP0PtcoEQApEvWZG3acbzBnzBdV4D5HXr3LM4KiuIXbBhGtHdb5UbL+7Niq0yVAjj7WsRZfw946a9r15D6Pz/xaikVBOkY55shnlbCqzRyfiX/t5qi3s2IwUCSRZkJxTVNk2xQhemwRntZNsCcNrmqEXjUgWL0LhMsvLy9Krx0GJuFlhP9FthBbIuKB6PJoUh73w5wvVUlp246ZhV9rBi7xRPVAc5G12pzBhQnGbhFf29TVwnQwfK+h/KH9Vi8BNFdhVL8ySpgHxqFPrkDHn57c36QE0LUpgekpuZLm9C6qqus+FF7WlEiv/PIz8/DzZT1mrEYuhf8uRirHAGvZJ9kBf9ssiZaWIXyQO8OxGwHf94QH5P58RYCbBKQ/s00tlRklVY4Fi2MYO+c4WmcE/bJ7Qg1PW3VejTPHCkMwny2rA4aSa8WKGBwxzsiIcic610EKENADiEL1LLTfd2XKH/3bR8MfTZFxWR7vIisSxln0zp6oYVF0Bvop8J2lUVPOuDt8OHolMc1Dz68unWsUKZLm3i8NMXJaEMHQIDzWJgRLGuTcOhLDHvSogZMFbC9fNJ0AHT7zV50t3ky2sMVBe4Xd8BNds++JtLrIczFPhKE7iqU7Ws156s79rQW3KK22mulO8hDJefeNx7Nly0pcZKnXfLIaQO9dGGz+ZdPFaUMTCpNUuQWyV/YJWWyjSzNZ8k295qJJ/d5b1/ui5fIBOBLLSuIq7TwCIc4ohrGEDibbK9OpzfFC4q/gR/u789mMGpZQFpUH5Fq9ICD3FQIbwYGHtLw0ztQdyfeUcAQU8HzJZJ/ZmQL3Ox4bjBrnDG3u1uNcPZgmYdc="};
    const $ = (id) => document.getElementById(id);
    const decoder = new TextDecoder();
    const encoder = new TextEncoder();
    const b64ToBytes = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    async function deriveKey(password) {
      const baseKey = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBytes(payload.salt), iterations: payload.iterations, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }
    async function decrypt(password) {
      const key = await deriveKey(password);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(payload.iv) }, key, b64ToBytes(payload.data));
      return decoder.decode(plain);
    }
    async function unlock(password) {
      const html = await decrypt(password);
      document.open();
      document.write(html);
      document.close();
    }
    $('form').addEventListener('submit', async (event) => {
      event.preventDefault();
      $('error').textContent = '';
      $('submit').disabled = true;
      try {
        await unlock($('password').value);
      } catch (err) {
        $('error').textContent = 'Contraseña incorrecta.';
        $('submit').disabled = false;
        $('password').select();
        $('card').classList.remove('shake');
        void $('card').offsetWidth;
        $('card').classList.add('shake');
      }
    });
  </script>
</body>
</html>
