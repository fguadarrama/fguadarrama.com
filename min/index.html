    <script>
      ;(() => {
        const favicon = document.getElementById('site-favicon')
        if (!favicon) return

        const paths = ["M3.5 9.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0","M8.5 4.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0","M8.5 14.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0","M3.5 19.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0","M13.5 9.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0","M18.5 4.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0","M13.5 19.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0","M18.5 14.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"]
        const makeFavicon = (color) => {
          const pathMarkup = paths.map((d) => `<path d="${d}"/>`).join('')
          const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/>${pathMarkup}</svg>`
          return `data:image/svg+xml,${encodeURIComponent(svg)}`
        }

        const syncFavicon = () => {
          const theme = document.documentElement.dataset.theme
          if (theme !== 'light' && theme !== 'dark') return
          favicon.href = makeFavicon(theme === 'dark' ? '#f6f7fc' : '#3F41F5')
        }

        new MutationObserver(syncFavicon).observe(document.documentElement, {
          attributes: true,
          attributeFilter: ['data-theme'],
        })
        syncFavicon()
      })()
    </script>

    <script>
      ;(() => {
        try {
          const saved = localStorage.getItem('francisco-dot-grid-theme')
          const theme = saved === 'dark' || saved === 'light'
            ? saved
            : matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
          document.querySelector('meta[name="theme-color"]')?.setAttribute(
            'content',
            theme === 'dark' ? '#2d2930' : '#f6f7fc',
          )
        } catch {
          // The stylesheet's light defaults remain available if storage is blocked.
        }
      })()
