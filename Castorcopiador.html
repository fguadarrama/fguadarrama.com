<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Castor Copiador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ysabeau:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Ysabeau', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0eb;
      color: #3a2e26;
      padding: 2rem;
    }

    .card {
      max-width: 520px;
      text-align: center;
    }

    .card img {
      width: 140px;
      height: auto;
      margin-bottom: 1.8rem;
    }

    .card p {
      font-size: 1.15rem;
      line-height: 1.7;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="beaver.png" alt="Castor copiador">
    <p>El castor copiador es un proyecto de código abierto y cualquiera puede utilizarlo. No se utilizan datos personales y su única función es copiar, copiar, copiar... y hacer diques.</p>
  </div>
</body>
</html>
