<!DOCTYPE html>
<!-- Inspired by https://codepen.io/fyildiz1974/pen/ByzvNEo by Fatih YILDIZ -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Particulate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* Inspired by https://codepen.io/fyildiz1974/pen/ByzvNEo by Fatih YILDIZ */

  :root {
    --blue:   #3A2EB4;
    --lime:   #C7E44C;
    --cream:  #F6F2F1;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #08080c;
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--cream);
    user-select: none;
  }

  canvas#main {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    cursor: none;
  }

  .cursor {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    width: 40px; height: 40px;
    margin: -20px 0 0 -20px;
    border-radius: 50%;
    border: 1.5px solid rgba(199, 228, 76, 0.45);
    transition: width .3s, height .3s, margin .3s, border-color .3s, background .3s;
    mix-blend-mode: difference;
  }
  .cursor.blow {
    width: 120px; height: 120px;
    margin: -60px 0 0 -60px;
    border-color: rgba(199, 228, 76, 0.2);
    background: rgba(199, 228, 76, 0.04);
  }
  .cursor.magnet {
    width: 80px; height: 80px;
    margin: -40px 0 0 -40px;
    border-color: rgba(58, 46, 180, 0.6);
    background: rgba(58, 46, 180, 0.07);
  }

  /* ===== UI OVERLAY ===== */
  .ui {
    position: fixed;
    z-index: 10;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    padding: 28px 24px 24px;
  }

  .top {
    text-align: center;
    pointer-events: auto;
  }

  .brand {
    font-size: clamp(1.8rem, 5vw, 3.4rem);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--cream) 20%, rgba(199, 228, 76, 0.55));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    font-size: clamp(0.7rem, 1.6vw, 0.88rem);
    font-weight: 300;
    opacity: 0.45;
    letter-spacing: 0.6px;
    margin-bottom: 18px;
    color: var(--cream);
  }

  .tools {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    pointer-events: auto;
  }

  .tool {
    padding: 8px 16px;
    border-radius: 22px;
    border: 1px solid rgba(199, 228, 76, 0.12);
    background: rgba(58, 46, 180, 0.12);
    color: rgba(246, 242, 241, 0.6);
    font-size: 0.75rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    letter-spacing: 0.3px;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tool:hover {
    background: rgba(58, 46, 180, 0.45);
    color: var(--lime);
    border-color: rgba(199, 228, 76, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(58, 46, 180, 0.35);
  }
  .tool.active {
    background: var(--lime);
    color: #111;
    border-color: transparent;
    font-weight: 700;
  }
  .tool svg {
    width: 14px; height: 14px;
  }

  .upload-wrap {
    position: relative;
    overflow: hidden;
  }
  .upload-wrap input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    font-size: 0;
  }

  /* ===== BOTTOM ===== */
  .bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: auto;
    width: 100%;
    max-width: 680px;
  }

  .info-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 0.6rem;
    opacity: 0.3;
    letter-spacing: 1.5px;
    font-family: "Space Grotesk", monospace;
    text-transform: uppercase;
    transition: opacity .3s;
  }

  /* PALETTE */
  .palette-dock {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    width: 100%;
    background: rgba(8, 8, 20, 0.65);
    backdrop-filter: blur(28px);
    border: 1px solid rgba(58, 46, 180, 0.25);
    border-radius: 20px;
    box-shadow: 0 16px 56px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(199, 228, 76, 0.04);
    justify-content: center;
    min-height: 70px;
    transition: all .4s;
  }
  .palette-dock:hover {
    border-color: rgba(58, 46, 180, 0.5);
    box-shadow: 0 16px 56px rgba(58, 46, 180, 0.2), 0 0 0 1px rgba(199, 228, 76, 0.08);
  }

  .pal-color {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    max-width: 90px;
    min-width: 0;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .pal-color:hover {
    transform: translateY(-6px) scale(1.05);
  }

  .pal-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 12px;
    border: 2px solid rgba(199, 228, 76, 0.08);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .pal-swatch::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 50%);
    border-radius: 10px;
    opacity: 0;
    transition: opacity .3s;
  }
  .pal-color:hover .pal-swatch::after { opacity: 1; }
  .pal-color:hover .pal-swatch {
    border-color: rgba(199, 228, 76, 0.25);
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }

  .pal-hex {
    font-size: 0.52rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    opacity: 0.5;
    font-family: "Space Grotesk", monospace;
    transition: opacity .3s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    color: var(--cream);
  }
  .pal-pct {
    font-size: 0.45rem;
    opacity: 0.3;
    font-weight: 400;
  }
  .pal-color:hover .pal-hex { opacity: 1; }

  .pal-empty .pal-swatch {
    background: rgba(58, 46, 180, 0.05) !important;
    border-style: dashed;
    border-color: rgba(199, 228, 76, 0.08);
  }

  .dock-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-left: 6px;
    flex-shrink: 0;
  }

  .dock-btn {
    width: 32px; height: 32px;
    border-radius: 9px;
    border: 1px solid rgba(58, 46, 180, 0.3);
    background: rgba(58, 46, 180, 0.12);
    color: rgba(199, 228, 76, 0.6);
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .3s;
    font-family: inherit;
  }
  .dock-btn:hover {
    background: var(--blue);
    color: var(--lime);
    transform: scale(1.1);
    border-color: var(--lime);
  }

  .hint {
    font-size: 0.62rem;
    opacity: 0.2;
    font-weight: 300;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cream);
  }

  /* ===== DROP ZONE ===== */
  .dropzone {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(8, 8, 20, 0.9);
    backdrop-filter: blur(20px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .dropzone.active { display: flex; }

  .dropzone-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 2px dashed rgba(199, 228, 76, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    animation: dzPulse 2s ease-in-out infinite;
  }
  @keyframes dzPulse {
    0%, 100% { transform: scale(1);    border-color: rgba(199, 228, 76, 0.15); }
    50%       { transform: scale(1.05); border-color: rgba(199, 228, 76, 0.35); }
  }
  .dropzone p {
    font-size: 0.9rem;
    opacity: 0.5;
    font-weight: 300;
    letter-spacing: 0.5px;
    color: var(--cream);
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%) translateY(20px) scale(0.95);
    background: rgba(58, 46, 180, 0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(199, 228, 76, 0.2);
    padding: 10px 22px;
    border-radius: 14px;
    font-size: 0.78rem;
    font-weight: 600;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 50;
    pointer-events: none;
    letter-spacing: 0.2px;
    color: var(--lime);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }

  /* ===== LOADING ===== */
  .loading {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(8, 8, 20, 0.96);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .loading.active { display: flex; }
  .loading-spinner {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 3px solid rgba(58, 46, 180, 0.25);
    border-top-color: var(--lime);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p {
    font-size: 0.8rem;
    opacity: 0.4;
    font-weight: 300;
    color: var(--cream);
  }

  @media (max-width: 600px) {
    .pal-swatch { border-radius: 9px; }
    .palette-dock { padding: 8px 10px; border-radius: 16px; gap: 3px; }
    .pal-hex { font-size: 0.45rem; }
    .pal-pct { display: none; }
    .ui { padding: 16px 12px 16px; }
    .tools { gap: 4px; }
    .tool { padding: 7px 12px; font-size: 0.68rem; }
  }
</style>
</head>
<body>

<canvas id="main"></canvas>
<div class="cursor" id="cursor"></div>

<div class="ui">
  <div class="top">
    <h1 class="brand">Particulate</h1>
    <p class="tagline">Shatter images into color. Collect the pieces.</p>
    <div class="tools">
      <div class="tool upload-wrap" id="uploadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        Upload Image
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <button class="tool" data-sample="city">🌃 City</button>
      <button class="tool" data-sample="nature">🌿 Nature</button>
      <button class="tool" data-sample="sunset">🌅 Sunset</button>
      <button class="tool" data-sample="abstract">🎨 Abstract</button>
      <div style="width:1px;height:20px;background:rgba(199,228,76,.12);margin:0 4px"></div>
      <button class="tool active" data-mode="blow" id="blowTool">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 12h8M12 8v8"/>
        </svg>
        Blow
      </button>
      <button class="tool" data-mode="magnet" id="magnetTool">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/>
          <path d="M12 8v8M8 12h8"/>
        </svg>
        Gather
      </button>
      <button class="tool" data-mode="freeze" id="freezeTool">❄ Freeze</button>
    </div>
  </div>

  <div class="bottom">
    <div class="info-bar" id="infoBar">
      <span id="particleCount">0 particles</span>
      <span>·</span>
      <span id="fpsDisplay">0 fps</span>
    </div>
    <div class="palette-dock" id="paletteDock"></div>
    <p class="hint">drag & drop an image or choose a sample · blow particles to explore</p>
  </div>
</div>

<div class="dropzone" id="dropzone">
  <div class="dropzone-ring">📸</div>
  <p>Drop your image here</p>
</div>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <p>Shattering into particles…</p>
</div>

<div class="toast" id="toast"></div>

<script>
// Inspired by https://codepen.io/fyildiz1974/pen/ByzvNEo by Fatih YILDIZ

// ==================== CANVAS ====================
const cvs = document.getElementById("main");
const ctx = cvs.getContext("2d", { willReadFrequently: true });
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width = W;
  cvs.height = H;
}
window.addEventListener("resize", () => { resize(); if (srcImg) shatterImage(srcImg); });
resize();

// ==================== STATE ====================
let particles = [];
let palette = [];
const PAL_SIZE = 6;
let mode = "blow";
let mx = W / 2, my = H / 2;
let isPointerDown = false;
let srcImg = null;
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 0;

// ==================== CURSOR ====================
const cursorEl = document.getElementById("cursor");
function updateCursor(x, y) {
  cursorEl.style.left = x + "px";
  cursorEl.style.top  = y + "px";
}

// ==================== PARTICLE ====================
class Particle {
  constructor(x, y, originX, originY, r, g, b, size) {
    this.x = x; this.y = y;
    this.originX = originX; this.originY = originY;
    this.r = r; this.g = g; this.b = b;
    this.size = size; this.baseSize = size;
    this.vx = 0; this.vy = 0;
    this.friction = 0.92 + Math.random() * 0.04;
    this.springStrength = 0.008 + Math.random() * 0.008;
    this.wanderAngle = Math.random() * Math.PI * 2;
    this.wanderSpeed = 0.02 + Math.random() * 0.02;
    this.opacity = 0; this.targetOpacity = 1;
  }

  update() {
    this.opacity += (this.targetOpacity - this.opacity) * 0.05;

    if (mode === "freeze") {
      this.vx *= 0.95; this.vy *= 0.95;
      this.x += this.vx; this.y += this.vy;
      return;
    }

    const dx = this.originX - this.x;
    const dy = this.originY - this.y;
    this.vx += dx * this.springStrength;
    this.vy += dy * this.springStrength;

    this.wanderAngle += this.wanderSpeed;
    this.vx += Math.cos(this.wanderAngle) * 0.05;
    this.vy += Math.sin(this.wanderAngle) * 0.05;

    if (isPointerDown || mode === "magnet") {
      const mdx = this.x - mx;
      const mdy = this.y - my;
      const dist = Math.sqrt(mdx * mdx + mdy * mdy);
      const radius = mode === "blow" ? 140 : mode === "magnet" ? 200 : 0;

      if (dist < radius && dist > 0) {
        const force = (radius - dist) / radius;
        const angle = Math.atan2(mdy, mdx);

        if (mode === "blow" && isPointerDown) {
          const power = force * force * 8;
          this.vx += Math.cos(angle) * power;
          this.vy += Math.sin(angle) * power;
          this.size = this.baseSize * (1 + force * 0.8);
        } else if (mode === "magnet") {
          const power = force * 2;
          this.vx -= Math.cos(angle) * power;
          this.vy -= Math.sin(angle) * power;
          this.size = this.baseSize * (1 - force * 0.3);
        }
      } else {
        this.size += (this.baseSize - this.size) * 0.1;
      }
    } else {
      this.size += (this.baseSize - this.size) * 0.1;
    }

    this.vx *= this.friction;
    this.vy *= this.friction;
    this.x += this.vx;
    this.y += this.vy;
  }

  draw() {
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = `rgb(${this.r},${this.g},${this.b})`;
    const s = Math.max(1, this.size);
    const half = s / 2;
    const rad = s > 4 ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(this.x - half + rad, this.y - half);
    ctx.lineTo(this.x + half - rad, this.y - half);
    ctx.quadraticCurveTo(this.x + half, this.y - half, this.x + half, this.y - half + rad);
    ctx.lineTo(this.x + half, this.y + half - rad);
    ctx.quadraticCurveTo(this.x + half, this.y + half, this.x + half - rad, this.y + half);
    ctx.lineTo(this.x - half + rad, this.y + half);
    ctx.quadraticCurveTo(this.x - half, this.y + half, this.x - half, this.y + half - rad);
    ctx.lineTo(this.x - half, this.y - half + rad);
    ctx.quadraticCurveTo(this.x - half, this.y - half, this.x - half + rad, this.y - half);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ==================== IMAGE → PARTICLES ====================
function shatterImage(img) {
  document.getElementById("loading").classList.add("active");
  setTimeout(() => {
    particles = [];
    const scale = Math.min((W * 0.7) / img.width, (H * 0.65) / img.height, 1);
    const iw = Math.floor(img.width * scale);
    const ih = Math.floor(img.height * scale);
    const ox = Math.floor((W - iw) / 2);
    const oy = Math.floor((H - ih) / 2);

    const oc = document.createElement("canvas");
    oc.width = iw; oc.height = ih;
    const octx = oc.getContext("2d");
    octx.drawImage(img, 0, 0, iw, ih);
    const imgData = octx.getImageData(0, 0, iw, ih).data;

    const targetParticles = Math.min(8000, Math.max(2000, (iw * ih) / 20));
    const gap  = Math.max(2, Math.floor(Math.sqrt((iw * ih) / targetParticles)));
    const pSize = gap * 0.95;

    for (let y = 0; y < ih; y += gap) {
      for (let x = 0; x < iw; x += gap) {
        const i = (y * iw + x) * 4;
        const r = imgData[i], g = imgData[i+1], b = imgData[i+2], a = imgData[i+3];
        if (a < 128) continue;
        const px = ox + x, py = oy + y;
        const edge = Math.random();
        let sx, sy;
        if      (edge < 0.25) { sx = Math.random() * W; sy = -50; }
        else if (edge < 0.50) { sx = Math.random() * W; sy = H + 50; }
        else if (edge < 0.75) { sx = -50;               sy = Math.random() * H; }
        else                  { sx = W + 50;             sy = Math.random() * H; }

        const p = new Particle(sx, sy, px, py, r, g, b, pSize);
        p.vx = (px - sx) * 0.01 + (Math.random() - 0.5) * 2;
        p.vy = (py - sy) * 0.01 + (Math.random() - 0.5) * 2;
        particles.push(p);
      }
    }

    extractPalette(imgData, iw, ih);
    document.getElementById("loading").classList.remove("active");
    document.getElementById("particleCount").textContent = particles.length.toLocaleString() + " particles";
    showToast(`${particles.length.toLocaleString()} particles created`);
  }, 100);
}

// ==================== COLOR EXTRACTION (Median Cut) ====================
function extractPalette(imgData, w, h) {
  const colors = [];
  const step = Math.max(1, Math.floor((w * h) / 10000));
  for (let i = 0; i < w * h; i += step) {
    const idx = i * 4;
    const r = imgData[idx], g = imgData[idx+1], b = imgData[idx+2], a = imgData[idx+3];
    if (a < 128) continue;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    if (max - min < 8 && max < 240 && min > 15) continue;
    colors.push([r, g, b]);
  }

  const buckets = medianCut(colors, PAL_SIZE);
  palette = buckets.map(bucket => {
    let tr = 0, tg = 0, tb = 0;
    bucket.forEach(c => { tr += c[0]; tg += c[1]; tb += c[2]; });
    const len = bucket.length;
    const r = Math.round(tr / len), g = Math.round(tg / len), b = Math.round(tb / len);
    return { r, g, b, hex: rgbHex(r, g, b), pct: ((bucket.length / colors.length) * 100).toFixed(1) };
  });
  palette.sort((a, b) => luminance(b) - luminance(a));
  updatePaletteUI();
}

function medianCut(colors, depth) {
  if (depth <= 1 || colors.length === 0) return [colors];
  let rMin=255,rMax=0,gMin=255,gMax=0,bMin=255,bMax=0;
  colors.forEach(c => {
    if (c[0]<rMin) rMin=c[0]; if (c[0]>rMax) rMax=c[0];
    if (c[1]<gMin) gMin=c[1]; if (c[1]>gMax) gMax=c[1];
    if (c[2]<bMin) bMin=c[2]; if (c[2]>bMax) bMax=c[2];
  });
  const rRange=rMax-rMin, gRange=gMax-gMin, bRange=bMax-bMin;
  let channel = 0;
  if (gRange >= rRange && gRange >= bRange) channel = 1;
  else if (bRange >= rRange && bRange >= gRange) channel = 2;
  colors.sort((a, b) => a[channel] - b[channel]);
  const mid = Math.floor(colors.length / 2);
  return [...medianCut(colors.slice(0, mid), depth/2), ...medianCut(colors.slice(mid), depth/2)];
}

function rgbHex(r, g, b) {
  const h = v => { const s = v.toString(16); return s.length === 1 ? "0"+s : s; };
  return `#${h(r)}${h(g)}${h(b)}`;
}

function luminance(c) { return 0.299*c.r + 0.587*c.g + 0.114*c.b; }

// ==================== PALETTE UI ====================
function updatePaletteUI() {
  const dock = document.getElementById("paletteDock");
  let html = "";
  for (let i = 0; i < PAL_SIZE; i++) {
    const c = palette[i];
    if (c) {
      html += `<div class="pal-color" data-i="${i}" onclick="copyColor(${i})">
        <div class="pal-swatch" style="background:${c.hex}"></div>
        <span class="pal-hex">${c.hex.toUpperCase()}</span>
        <span class="pal-pct">${c.pct}%</span>
      </div>`;
    } else {
      html += `<div class="pal-color pal-empty">
        <div class="pal-swatch"></div>
        <span class="pal-hex">—</span>
      </div>`;
    }
  }
  html += `<div class="dock-actions">
    <button class="dock-btn" onclick="copyCSS()" title="Copy CSS Variables">{ }</button>
    <button class="dock-btn" onclick="copySVG()" title="Copy SVG">◇</button>
    <button class="dock-btn" onclick="resetAll()" title="Reset">✕</button>
  </div>`;
  dock.innerHTML = html;

  dock.querySelectorAll(".pal-color").forEach((el, i) => {
    el.style.opacity = "0";
    el.style.transform = "translateY(12px) scale(0.8)";
    setTimeout(() => {
      el.style.transition = "all .5s cubic-bezier(.34,1.56,.64,1)";
      el.style.opacity = "1";
      el.style.transform = "translateY(0) scale(1)";
    }, i * 80 + 50);
  });
}

// ==================== COPY ====================
function copyColor(i) {
  if (!palette[i]) return;
  navigator.clipboard.writeText(palette[i].hex.toUpperCase()).catch(() => {});
  showToast(`Copied ${palette[i].hex.toUpperCase()}`);
}
function copyCSS() {
  if (!palette.length) { showToast("Load an image first"); return; }
  const css = `:root {\n${palette.map((c,i) => `  --color-${i+1}: ${c.hex}; /* rgb(${c.r}, ${c.g}, ${c.b}) — ${c.pct}% */`).join("\n")}\n}`;
  navigator.clipboard.writeText(css).catch(() => {});
  showToast("CSS variables copied");
}
function copySVG() {
  if (!palette.length) { showToast("Load an image first"); return; }
  const sw=100, sh=120;
  const rects = palette.map((c,i) => `  <rect x="${i*sw}" y="0" width="${sw}" height="${sh}" fill="${c.hex}"/>`).join("\n");
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${palette.length*sw}" height="${sh}">\n${rects}\n</svg>`;
  navigator.clipboard.writeText(svg).catch(() => {});
  showToast("SVG palette copied");
}
function resetAll() {
  particles = []; palette = []; srcImg = null;
  updatePaletteUI();
  document.getElementById("particleCount").textContent = "0 particles";
}

// ==================== TOAST ====================
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove("show"), 2000);
}

// ==================== SAMPLE IMAGES ====================
const SAMPLES = {
  city:     "https://images.unsplash.com/photo-1514565131-fce0801e5785?w=600&q=80",
  nature:   "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=80",
  sunset:   "https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=600&q=80",
  abstract: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&q=80"
};

document.querySelectorAll("[data-sample]").forEach(btn => {
  btn.addEventListener("click", () => loadImage(SAMPLES[btn.dataset.sample]));
});

function loadImage(src) {
  document.getElementById("loading").classList.add("active");
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload  = () => { srcImg = img; shatterImage(img); };
  img.onerror = () => { document.getElementById("loading").classList.remove("active"); showToast("Failed to load image"); };
  img.src = src;
}

// File upload
document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { srcImg = img; shatterImage(img); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Drag & drop
const dropzone = document.getElementById("dropzone");
document.addEventListener("dragover",  e => { e.preventDefault(); dropzone.classList.add("active"); });
document.addEventListener("dragleave", e => { if (e.relatedTarget === null) dropzone.classList.remove("active"); });
document.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("active");
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { srcImg = img; shatterImage(img); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ==================== MODE SWITCHING ====================
document.querySelectorAll("[data-mode]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    cursorEl.className = "cursor" + (mode === "blow" ? "" : " " + mode);
  });
});

// ==================== MOUSE ====================
cvs.addEventListener("pointermove",  e => { mx = e.clientX; my = e.clientY; updateCursor(mx, my); });
cvs.addEventListener("pointerdown",  e => { isPointerDown = true; mx = e.clientX; my = e.clientY; cursorEl.classList.add(mode === "blow" ? "blow" : mode); });
cvs.addEventListener("pointerup",    ()  => { isPointerDown = false; cursorEl.className = "cursor" + (mode !== "blow" ? " " + mode : ""); });
cvs.addEventListener("pointerleave", ()  => { isPointerDown = false; });

cvs.addEventListener("touchmove",  e => { e.preventDefault(); mx = e.touches[0].clientX; my = e.touches[0].clientY; updateCursor(mx, my); }, { passive: false });
cvs.addEventListener("touchstart", e => { isPointerDown = true; mx = e.touches[0].clientX; my = e.touches[0].clientY; updateCursor(mx, my); });
cvs.addEventListener("touchend",   ()  => { isPointerDown = false; });

// ==================== KEYBOARD ====================
document.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); explodeAll(); }
  if (e.key === "1") document.querySelector('[data-mode="blow"]').click();
  if (e.key === "2") document.querySelector('[data-mode="magnet"]').click();
  if (e.key === "3") document.querySelector('[data-mode="freeze"]').click();
  if (e.key === "c") copyCSS();
  if (e.key === "r") reassemble();
});

function explodeAll() {
  particles.forEach(p => {
    const angle = Math.random() * Math.PI * 2;
    const power = 5 + Math.random() * 15;
    p.vx += Math.cos(angle) * power;
    p.vy += Math.sin(angle) * power;
  });
  showToast("💥 Boom!");
}

function reassemble() {
  particles.forEach(p => {
    p.springStrength = 0.05;
    setTimeout(() => { p.springStrength = 0.008 + Math.random() * 0.008; }, 2000);
  });
  showToast("Reassembling…");
}

// ==================== RENDER LOOP ====================
function render() {
  ctx.fillStyle = "rgba(8, 8, 12, 0.25)";
  ctx.fillRect(0, 0, W, H);

  particles.forEach(p => { p.update(); p.draw(); });

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    document.getElementById("fpsDisplay").textContent = fps + " fps";
    frameCount = 0;
    lastFpsTime = now;
  }

  requestAnimationFrame(render);
}

// ==================== START ====================
updatePaletteUI();
render();
setTimeout(() => loadImage(SAMPLES.abstract), 500);
</script>
</body>
</html>
