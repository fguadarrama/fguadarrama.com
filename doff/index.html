    <meta name="theme-color" content="#f6f7fc" />
    <meta name="description" content="Francisco Guadarrama — personal website" />
    <script>
      ;(() => {
        try {
          const saved = localStorage.getItem('francisco-dot-grid-theme')
          const theme = saved === 'dark' || saved === 'light'
            ? saved
            : matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
          document.querySelector('meta[name="theme-color"]')?.setAttribute(
            'content',
            theme === 'dark' ? '#2d2930' : '#f6f7fc',
          )
        } catch {
          // The stylesheet's light defaults remain available if storage is blocked.
        }
      })()
    </script>
